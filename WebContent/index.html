<!DOCTYPE html>
<html>
<head>
    <title>DevOps CI/CD Pipeline</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
            text-align: center;
        }

        .container {
            margin-top: 80px;
        }

        h1 {
            font-size: 50px;
            color: #38bdf8;
        }

        h2 {
            color: #22c55e;
        }

        .pipeline {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 50px;
            gap: 15px;
        }

        .step {
            background: #1e293b;
            padding: 20px;
            border-radius: 10px;
            width: 150px;
            box-shadow: 0 0 15px rgba(56,189,248,0.4);
        }

        .arrow {
            font-size: 30px;
            color: #38bdf8;
            align-self: center;
        }

        .success {
            margin-top: 40px;
            font-size: 24px;
            color: #22c55e;
            font-weight: bold;
        }

        .footer {
            margin-top: 50px;
            color: #cbd5e1;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🚀 DevOps CI/CD Pipeline</h1>
    <h2>Successfully Deployed Using Jenkins & Tomcat</h2>

    <div class="pipeline">
        <div class="step">GitHub</div>
        <div class="arrow">➡</div>

        <div class="step">Jenkins</div>
        <div class="arrow">➡</div>

        <div class="step">Build</div>
        <div class="arrow">➡</div>

        <div class="step">JUnit Test</div>
        <div class="arrow">➡</div>

        <div class="step">Deploy</div>
        <div class="arrow">➡</div>

        <div class="step">Tomcat</div>
    </div>

    <div class="success">
        ✅ Pipeline Executed Successfully
    </div>

    <div class="footer">
        Created by Hanzala Shaikh | Jenkins CI/CD Demo Project
    </div>
</div>

</body>
</html>
